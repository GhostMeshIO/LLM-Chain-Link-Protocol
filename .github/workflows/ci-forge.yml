name: CI Forge

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 * * * *'   # hourly harvest
  workflow_dispatch:

jobs:
  harvest-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install PHP dependencies
        run: composer install --no-progress --prefer-dist

      - name: Install Python dependencies
        working-directory: src/python
        run: |
          pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run GitHarvester (live harvest)
        run: |
          php src/php/Bin/harvest-logs.php --repo=${{ github.workspace }} --json > harvest_result.json
          cat harvest_result.json
        env:
          REPO_PATH: ${{ github.workspace }}

      - name: Check entropy bounds
        run: |
          S_LOG=$(jq '.s_log' harvest_result.json)
          if (( $(echo "$S_LOG < 0.10" | bc -l) )) || (( $(echo "$S_LOG > 0.30" | bc -l) )); then
            echo "Entropy $S_LOG is out of bounds!"
            exit 1
          fi
          echo "Entropy $S_LOG is within bounds."

      - name: Run QNVMBridge test
        run: |
          php -r "
            require 'src/php/Services/QNVMBridge.php';
            require 'src/php/Config/qnvm.php';
            \$config = include 'src/php/Config/qnvm.php';
            \$bridge = new GhostMesh\Services\QNVMBridge(\$config);
            \$result = \$bridge->runSimulation('${{ github.workspace }}', 0.22);
            echo json_encode(\$result, JSON_PRETTY_PRINT);
          " > qnvm_result.json
          cat qnvm_result.json

      - name: Run PHPUnit tests
        run: vendor/bin/phpunit tests/php/Unit

      - name: Archive logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forge-artifacts
          path: |
            harvest_result.json
            qnvm_result.json
            var/logs/
          retention-days: 7
